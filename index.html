<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGT Nexus - Activation Portal</title>
</head>
<body style="background-color: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

    <div class="container" style="width: 90%; max-width: 400px; padding: 20px; border: 1px solid #38bdf8; border-radius: 15px; background: #0f172a;">
        
        <div class="header-logo" style="text-align: center; margin-bottom: 25px;">
            <img src="IMG_6870.png" alt="HGT Logo" style="width: 150px; height: auto; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.5)); border-radius: 50%;">
            <h2 style="color: #38bdf8; margin-top: 15px; font-weight: 700; letter-spacing: 1px;">HGT NEXUS</h2>
        </div>

        <input type="text" id="fullName" placeholder="Full Name" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; background: #1e293b; color: white; border: 1px solid #38bdf8;">
        <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; background: #1e293b; color: white; border: 1px solid #38bdf8;">
        <input type="tel" id="phone" placeholder="Phone" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; background: #1e293b; color: white; border: 1px solid #38bdf8;">
        <input type="text" id="country" placeholder="Country" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; background: #1e293b; color: white; border: 1px solid #38bdf8;">
        
        <select id="platform" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #1e293b; color: white; border: 1px solid #38bdf8;">
            <option>Select Platform</option>
            <option>Desktop</option>
            <option>Mobile</option>
        </select>
        
        <select id="plan" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #1e293b; color: white; border: 1px solid #38bdf8;">
            <option>Select Plan</option>
            <option>Basic</option>
            <option>Premium</option>
        </select>

        <button onclick="sendTo('telegram')" style="width: 100%; padding: 15px; background: #38bdf8; color: #020617; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
            Activate Now
        </button>

    </div>

    <script>
        async function sendTo(channel) {
            const formData = {
                name: document.getElementById("fullName").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                country: document.getElementById("country").value,
                platform: document.getElementById("platform").value,
                plan: document.getElementById("plan").value
            };

            // Your Google Apps Script URL
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOofKGArycJIiVyfSTQqlug2alEZrNJe3Hbfrhlt6dsQYYMNlEpVZAcHY0h8ErrfkJ/exec";
            
            // 1. Send data to Google Sheets
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                });
            } catch (error) {
                console.error("Sheet connection error:", error);
            }

            // 2. Prepare Telegram Message
            const message = encodeURIComponent(
                `🔐 Bot‑Grabber Activation Request\n\n` +
                `👤 Name: ${formData.name}\n` +
                `📧 Email: ${formData.email}\n` +
                `📱 Phone: ${formData.phone}\n` +
                `🌍 Country: ${formData.country}\n` +
                `💠 Platform: ${formData.platform}\n` +
                `📦 Plan: ${formData.plan}`
            );

            // 3. Redirect to Telegram
            window.location.href = `https://t.me/multi_grabber_system_bot?text=${message}`;
        }
    </script>
</body>
</html>
